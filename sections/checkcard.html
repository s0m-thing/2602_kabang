<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- 폰트어썸 불러오기 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- 제이쿼리 불러오기 -->
     <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

     <!-- 슬릭 슬라이더 불러오기 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.min.css">
</head>
<body>

    <section class="checkcard_box con-min-width">
        <div class="con">
            <h3>프렌즈 체크카드,<br>내가 고르는 선택의 즐거움</h3> 
            <p>프렌즈 디자인부터 멋스러운 블랙 컬러 카드까지 원하는 디자인과 기능을 선택할 수 있습니다.</p>

            <div class="btn_box">
                <a href="#">
                    카카오 프렌즈 체크카드
                    <img src="../imgs/imgi_2_home_arr.png" alt="">
                </a>
            </div>

            <div class="slider_box">
                <div class="arrows">
                    <div class="btn_arrow_left"><img src="../imgs/img-left.png" alt="슬라이더버튼왼"></div>
                    <div class="btn_arrow_right"><img src="../imgs/img-right.png" alt="슬라이더버튼오"></div>
                </div>

                <div class="slick">
                    <div class="item">
                        <div class="img-box">
                            <img src="../imgs/imgi_14_card-1.png" alt="">
                        </div>
                    </div>
                    <div class="item">
                        <div class="img-box">
                            <img src="../imgs/imgi_10_card-2.png" alt="">
                        </div>
                    </div>
                    <div class="item">
                        <div class="img-box">
                            <img src="../imgs/imgi_11_card-3.png" alt="">
                        </div>
                    </div>
                    <div class="item">
                        <div class="img-box">
                            <img src="../imgs/imgi_12_card-4.png" alt="">
                        </div>
                    </div>
                    <div class="item">
                        <div class="img-box">
                            <img src="../imgs/imgi_13_card-5.png" alt="">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>





    <style>
        /* 노말라이즈 */
        body, ul, li {
        margin:0;
        padding:0;
        list-style:none;
        }

        a {
        color:inherit;
        text-decoration:none;
        }

        /* 라이브러리 */
        .border-red {
        border:4px solid red;
        }

        .border-pink {
        border:4px solid pink;
        }

        .border-blue {
        border:4px solid blue;
        }

        .border-green {
        border:4px solid green;
        }

        .border-black {
        border:4px solid black;
        }

        .border-gold {
        border:4px solid gold;
        }

        .flex {
            display:flex;
        }

        .flex-jc-e {
            justify-content:flex-end;
        }

        .flex-jc-s {
            justify-content:flex-start;
        }

        .flex-jc-c {
            justify-content:center;
        }

        .flex-jc-sb {
            justify-content:space-between;
        }

        .flex-ai-c {
            align-items:center;
        }

        .flex-as-c {
            align-self: center;
        }

        .flex-grow-1 {
            flex-grow: 1;
        }

        .height-100p {
            height:100%;
        }

        .block {
            display:block;
        }

        .con {
            margin-left:auto;
            margin-right:auto;
        }

        .img-box > img {
            width: 100%;
            display: block;
        }

        .relative {
            position: relative;
        }

        /* 커스텀 */
        .con {
            width: 1080px;
        }

        .con-min-width {
            min-width: 1080px;
        }

        ::selection {
            background-color: #FFE100;
        }


    </style>

    <script>
        
    </script>

</body>
</html>
