<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- 폰트어썸 불러오기 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- 제이쿼리 불러오기 -->
     <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

    <div class="main_banner con-min-width">
        <div class="bg"></div>
        <div class="con relative">
            <div class="text_box">
            <h3>이미 모두의 은행<br>지금은 카카오뱅크</h3>

            <p>
                한 사람, 한 사람을 위해 시작한 은행이
                <br>
                더 많은 사람들이 찾는 모두의 은행이 되었습니다.
            </p>

            <p>
                보내고, 받고, 모으고, 쓰는
                <br>
                당신의 모든 일이 바뀌고 있습니다.
            </p>

            <ul class="btns flex">
                <li>
                    <a href="#">
                        <span class="ico ico-1"></span>
                        <span>Google Play</span>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <span class="ico ico-2"></span>
                        <span>App Store</span>
                    </a>
                </li>
            </ul>
        </div>
        </div>
        
        <div class="con img-box banner_img">
            <img src="../imgs/imgi_21_main-bg3.png" alt="banner">
        </div>
    </div>







    <style>
        /* 노말라이즈 */
        body, ul, li {
        margin:0;
        padding:0;
        list-style:none;
        }

        a {
        color:inherit;
        text-decoration:none;
        }

        /* 라이브러리 */
        .border-red {
        border:4px solid red;
        }

        .border-pink {
        border:4px solid pink;
        }

        .border-blue {
        border:4px solid blue;
        }

        .border-green {
        border:4px solid green;
        }

        .border-black {
        border:4px solid black;
        }

        .border-gold {
        border:4px solid gold;
        }

        .flex {
            display:flex;
        }

        .flex-jc-e {
            justify-content:flex-end;
        }

        .flex-jc-s {
            justify-content:flex-start;
        }

        .flex-jc-c {
            justify-content:center;
        }

        .flex-jc-sb {
            justify-content:space-between;
        }

        .flex-ai-c {
            align-items:center;
        }

        .flex-as-c {
            align-self: center;
        }

        .flex-grow-1 {
            flex-grow: 1;
        }

        .height-100p {
            height:100%;
        }

        .block {
            display:block;
        }

        .con {
            margin-left:auto;
            margin-right:auto;
        }

        .img-box > img {
            width: 100%;
            display: block;
        }

        .relative {
            position: relative;
        }

        /* 커스텀 */
        .con {
            width: 1080px;
        }

        .con-min-width {
            min-width: 1080px;
        }

        ::selection {
            background-color: #FFE100;
        }

        /* -------------헤더 시작-------------- */
        header {
            width: 100%;
            height: 80px;
            font-size: 15px;
            background-color: #fff;
            position: fixed;
            top: 0;
            left: 0;
            border-bottom: 1px solid rgba(0, 0, 0, .1);
        }

        /* 로고 */
        header .logo_box > a {
            width: 116px;
        }

        /* 메뉴 박스 - 1차 메뉴 */
        header .menu_box > ul > li > a {
            margin: 0 12px;
            padding: 0 12px;
            position: relative;
        }

        header .menu_box ul > li > a:hover {
            text-decoration: underline;
        }

        header .menu_box > ul > li > a::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 2px;
            left: 0;
            bottom: 0;
            background-color: #000;
            display: none;
        }

        header .menu_box > ul > li:hover > a::after {
            display: block;
        }

        /* 메뉴 박스 - 2차 메뉴 */
        header .menu_box > ul > li > div {
            width: 100%;
            background-color: fff;
            position: absolute;
            top: 100%;
            left: 0;
            display: none;
            padding: 60px 0 36px;
            box-shadow: 0 4px 12px 0 rgba(0, 0, 0, .12);
        }

        header .menu_box > ul > li:hover > div {
            display: block;
        }

        header .menu_box .menu_box-sec_menu > ul > li {
            width: calc(100% / 6);
        }

        header .menu_box > ul > li:first-child .menu_box-sec_menu > ul > li {
            width: calc(100% / 4);
        }

        header .menu_box > ul > li:last-child .menu_box-sec_menu > ul > li {
            width: calc(100% / 5);
        }

        header .menu_box .menu_box-sec_menu > ul > li > a {
            margin-bottom: 20px;
            font-size: 17px;
            text-align: center;
        }

        header .menu_box .menu_box-sec_menu ul li a[target="_blank"]::after {
            content: "";
            width: 14px;
            height: 14px;
            display: inline-block;
            background: url(../imgs/svg_line_outlink.svg);
            background-size: 14px 14px;
            margin-left: 8px;
            margin-top: -2px;
            vertical-align: middle;
        }

        header .menu_box .menu_box-sec_menu > ul > li > a[target="_blank"]::after {
            width: 18px;
            height: 18px;
            background-size: 18px 18px;
            margin-top: -5px;
        }

        /* 메뉴 박스 - 3차 메뉴 */
        header .menu_box .menu_box-sec_menu ul ul > li > a {
            margin-bottom: 24px;
            font-size: 13px;
            text-align: center;
            color: #444;
        }

        /* dropdown menu */
        header .drop_down {
            position: relative;
        }

        header .drop_btn {
            background: rgba(244, 244, 244, .8);
            color: rgba(68, 68, 68, .8);
            border: 1px solid rgba(229, 229, 229, .8);
            margin: 0 28px 0 14px;
            padding: 0 14px 0 18px;
            height: 40px;
            font-size: 15px;
            cursor: pointer;
            border-radius: 40px;
        }

        header .drop_down .drop_btn::after {
			content: "";
			width: 12px;
			height: 12px;
			margin-left: 10px;
			background: url(/imgs/svg_line_arrow_down.svg);
			background-size: 12px;
			display: inline-block;
            transition: all .3s;
		}

        header .drop_down .drop_btn.rotate::after {
            transform: rotate(-180deg);
        }


        header .drop_down .drop_down_content {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(4px);
            width: 240px;
            margin-top: 29px;
            line-height: 48px;
            border-radius: 6px;
            background-color: #fff;
            box-shadow: 0 4px 12px 0 rgba(0, 0, 0, .12);
            visibility: hidden;
            opacity: 0;
            transition: all .1s linear;
        }

        header .drop_down .drop_down_content.is-active {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        header .drop_down .drop_down_content a {
            font-size: 13px;
            display: block;
            padding: 0 24px;
            box-sizing: border-box;
        }

        header .drop_down .drop_down_content a:hover {
            background-color: #f7f7f7;
            text-decoration: underline;
        }

        header .drop_down a[target="_blank"]::after {
            content: "";
            width: 12px;
            height: 12px;
            display: inline-block;
            background: url(../imgs/svg_line_outlink.svg);
            background-size: 12px 12px;
            margin-left: 8px;
            margin-top: -3px;
            vertical-align: middle;
        }

        /* 글로벌 로고 */
        header .global_logo {
            display: inline-block;
            width: 20px;
        }

        header .global_logo > img {
            display: block;
            width: 100%;
        }

        header .global_logo:hover > img {
            opacity: .4;
        }

        /* 헤더 끝 */

        /* 메인 배너 시작 */
        .main_banner {
            position: relative;
        }

        .main_banner .banner_img {
            width: 1200px;
        }

        .main_banner .bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 720px;
            z-index: -1;
            background-color: #ffef6b;
        }

        /* 텍스트 시작 */
        .main_banner .text_box {
            position: absolute;
            left: 20px;
            top: 130px;
        }

        .main_banner .text_box > h3 {
            margin: 0;
            font-size: 49px;
            line-height: 1.4;
        }

        .main_banner .text_box > p {
            font-size: 16px;
            line-height: 1.95;
            opacity: .7;
        }

        .main_banner .text_box > .btns {
            margin-top: 50px;
        }

        .main_banner .text_box > .btns > li:first-child {
            margin-right: 12px;
        }

        .main_banner .text_box > .btns > li > a {
            width: 178px;
            height: 56px;
            border: 1px solid rgba(255, 255, 255, .3);
            border-radius: 12px;
            font-size: 16.2px;
            font-weight: bold;
            line-height: 56px;
            color: #333;
            background-color: #fff;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main_banner .text_box > .btns .ico {
            width: 24px;
            height: 24px;
            display: block;
            background-image: url(../imgs/img_kabang_250717.png);
            margin-right: 10px;
        }

        .main_banner .text_box > .btns .ico-1 {
            background-position: -341px -292px;
        }

        .main_banner .text_box > .btns .ico-2 {
            background-position: -371px -292px;
        }
        /* 텍스트 끝 */
        /* 메인 배너 끝 */
    </style>

</body>
</html>
