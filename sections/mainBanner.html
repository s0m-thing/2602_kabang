<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- 폰트어썸 불러오기 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- 제이쿼리 불러오기 -->
     <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

    <section class="main_banner con-min-width">
        <div class="bg"></div>
        <div class="con relative">
            <div class="text_box">
            <h3>이미 모두의 은행<br>지금은 카카오뱅크</h3>

            <p>
                한 사람, 한 사람을 위해 시작한 은행이
                <br>
                더 많은 사람들이 찾는 모두의 은행이 되었습니다.
            </p>

            <p>
                보내고, 받고, 모으고, 쓰는
                <br>
                당신의 모든 일이 바뀌고 있습니다.
            </p>

            <ul class="btns flex">
                <li>
                    <a href="#">
                        <span class="ico ico-1"></span>
                        <span>Google Play</span>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <span class="ico ico-2"></span>
                        <span>App Store</span>
                    </a>
                </li>
            </ul>
        </div>
        </div>
        
        <div class="con img-box banner_img">
            <img src="../imgs/imgi_21_main-bg3.png" alt="banner">
        </div>
    </section>







    <style>
        /* 노말라이즈 */
        body, ul, li {
        margin:0;
        padding:0;
        list-style:none;
        }

        a {
        color:inherit;
        text-decoration:none;
        }

        /* 라이브러리 */
        .border-red {
        border:4px solid red;
        }

        .border-pink {
        border:4px solid pink;
        }

        .border-blue {
        border:4px solid blue;
        }

        .border-green {
        border:4px solid green;
        }

        .border-black {
        border:4px solid black;
        }

        .border-gold {
        border:4px solid gold;
        }

        .flex {
            display:flex;
        }

        .flex-jc-e {
            justify-content:flex-end;
        }

        .flex-jc-s {
            justify-content:flex-start;
        }

        .flex-jc-c {
            justify-content:center;
        }

        .flex-jc-sb {
            justify-content:space-between;
        }

        .flex-ai-c {
            align-items:center;
        }

        .flex-as-c {
            align-self: center;
        }

        .flex-grow-1 {
            flex-grow: 1;
        }

        .height-100p {
            height:100%;
        }

        .block {
            display:block;
        }

        .con {
            margin-left:auto;
            margin-right:auto;
        }

        .img-box > img {
            width: 100%;
            display: block;
        }

        .relative {
            position: relative;
        }

        /* 커스텀 */
        .con {
            width: 1080px;
        }

        .con-min-width {
            min-width: 1080px;
        }

        ::selection {
            background-color: #FFE100;
        }


    </style>

</body>
</html>
