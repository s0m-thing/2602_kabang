<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- 폰트어썸 불러오기 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- 제이쿼리 불러오기 -->
     <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

    <footer class="con-min-width">
        <div class="con">
            <div class="box_1">
                <div class="menu_box">
                    <ul>
                        <li><a href="#">모바일뱅킹 서비스 이용약관</a></li>
                        <li><a href="#">전자금융거래 기본약관</a></li>
                        <li><a href="#" class="bold">위치기반 서비스 이용약관</a></li>
                        <li><a href="#">카카오뱅크 인증서 서비스 이용약관</a></li>
                        <li><a href="#" class="bold">개인정보 처리방침</a></li>
                        <li><a href="#">신용정보활용체제</a></li>
                        <li><a href="#">전자서명업무준칙</a></li>
                        <br>
                        <li><a href="#" class="bold">전자민원접수</a></li>
                        <li><a href="#">보호금융상품등록부</a></li>
                        <li><a href="#">상품공시실</a></li>
                        <li><a href="#">경영공시</a></li>
                        <li><a href="#">공지사항</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>


    <style>
        /* 노말라이즈 */
        body, ul, li {
        margin:0;
        padding:0;
        list-style:none;
        }

        a {
        color:inherit;
        text-decoration:none;
        }

        /* 라이브러리 */
        .border-red {
        border:4px solid red;
        }

        .border-pink {
        border:4px solid pink;
        }

        .border-blue {
        border:4px solid blue;
        }

        .border-green {
        border:4px solid green;
        }

        .border-black {
        border:4px solid black;
        }

        .border-gold {
        border:4px solid gold;
        }

        .flex {
            display:flex;
        }

        .flex-jc-e {
            justify-content:flex-end;
        }

        .flex-jc-s {
            justify-content:flex-start;
        }

        .flex-jc-c {
            justify-content:center;
        }

        .flex-jc-sb {
            justify-content:space-between;
        }

        .flex-ai-c {
            align-items:center;
        }

        .flex-as-c {
            align-self: center;
        }

        .flex-grow-1 {
            flex-grow: 1;
        }

        .height-100p {
            height:100%;
        }

        .block {
            display:block;
        }

        .con {
            margin-left:auto;
            margin-right:auto;
        }

        .img-box > img {
            width: 100%;
            display: block;
        }

        .relative {
            position: relative;
        }

        /* 커스텀 */
        .con {
            width: 1080px;
        }

        .con-min-width {
            min-width: 1080px;
        }

        ::selection {
            background-color: #FFE100;
        }

        .bold {
            font-weight: bold;
            color: #000;
        }

        /* 푸터 시작 */
        footer {
            background-color: #eee;
        }

        footer .box_1 {
            padding: 20px 0 16px;
            font-size: 11px;
            color: #666;
        }

        footer .box_1 > .menu_box > ul > li {
            display: inline-block;
            position: relative;
            padding: 4px 15px;
        }

        footer .box_1 > .menu_box > ul > li:not(:first-child)::after {
            content: "";
            background-color: #d8d8d8;
            width: 1px;
            height: 10px;
            position: absolute;
            top: 50%;
            left: -2.5px;
            transform: translateY(-50%);
        }


        /* 푸터 끝 */

    </style>

</body>
</html>
